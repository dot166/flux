name: Build application

on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          fetch-tags: true
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 17
          cache: gradle
      - name: Configure git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      - name: Build with Gradle
        run: ./gradlew assembleRelease
      - name: Check if Release build
        shell: sh
        run: |
          VERSION=$(jq '.elements[0].versionCode' app/build/outputs/apk/release/output-metadata.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          RELEASE=0 && git show-ref --tags --verify --quiet "refs/tags/$VERSION" || RELEASE=1
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
      - name: send to repo and prebuilt
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'dot166/flux' && env.RELEASE == '1' }}
        run: |
          echo "${{ secrets.KEYSTORE }}" > a.txt
          base64 -d a.txt > key.jks
          echo "${{ secrets.KEYSTORE_PROPS }}" > b.txt
          base64 -d b.txt > keystore.properties
          ./gradlew assembleRelease # rebuild so it is actually signed
          echo ${{ env.VERSION }}
          mkdir -p artifacts/apps/packages/io.github.dot166.flux/${{ env.VERSION }}
          echo "channel = \"stable"\" > artifacts/apps/packages/io.github.dot166.flux/${{ env.VERSION }}/channel.toml
          cp app/build/outputs/apk/release/app-release.apk artifacts/apps/packages/io.github.dot166.flux/${{ env.VERSION }}/base.apk
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/dot166/apks.git apks
          cp -r artifacts/* apks/
          cd apks
          git add .
          git commit -m "Flux ${{ env.VERSION }}"
          git push origin
          cd ..
          rm -rf artifacts
          rm -rf apks
      - name: Upload to new Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'dot166/flux' && env.RELEASE == '1' }}
        with:
          tag_name: ${{ env.VERSION }}
          make_latest: true
          generate_release_notes: true
